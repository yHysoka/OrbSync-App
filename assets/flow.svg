<svg viewBox="0 0 1180 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ft fd">
  <title id="ft">Como o OrbSync funciona</title>
  <desc id="fd">Você descreve, o Líder planeja, os agentes trabalham em paralelo, você acompanha no Fluxo e revisa.</desc>
  <rect width="1180" height="200" rx="18" fill="#0b0c0e"/>
  <rect x="0.75" y="0.75" width="1178.5" height="198.5" rx="18" fill="none" stroke="#ffffff" stroke-opacity="0.07"/>
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#ffae3d"/>
    </marker>
  </defs>

  <g font-family="Segoe UI, system-ui, sans-serif">
    <!-- step boxes -->
    <g>
      <rect x="22" y="48" width="200" height="104" rx="14" fill="#15181e" stroke="#ffffff" stroke-opacity="0.10"/>
      <circle cx="48" cy="76" r="13" fill="#ffae3d" fill-opacity="0.16"/><text x="48" y="81" text-anchor="middle" font-size="15" font-weight="700" fill="#ffae3d">1</text>
      <text x="40" y="112" font-size="18" font-weight="700" fill="#ffffff">Você descreve</text>
      <text x="40" y="134" font-size="13.5" fill="#8b97a4">o que quer construir</text>
    </g>
    <g>
      <rect x="257" y="48" width="200" height="104" rx="14" fill="#15181e" stroke="#ffffff" stroke-opacity="0.10"/>
      <circle cx="283" cy="76" r="13" fill="#ffae3d" fill-opacity="0.16"/><text x="283" y="81" text-anchor="middle" font-size="15" font-weight="700" fill="#ffae3d">2</text>
      <text x="275" y="112" font-size="18" font-weight="700" fill="#ffffff">Líder planeja</text>
      <text x="275" y="134" font-size="13.5" fill="#8b97a4">divide em tarefas</text>
    </g>
    <g>
      <rect x="492" y="48" width="200" height="104" rx="14" fill="#15181e" stroke="#ffae3d" stroke-opacity="0.40"/>
      <circle cx="518" cy="76" r="13" fill="#ffae3d" fill-opacity="0.16"/><text x="518" y="81" text-anchor="middle" font-size="15" font-weight="700" fill="#ffae3d">3</text>
      <text x="510" y="112" font-size="18" font-weight="700" fill="#ffffff">Agentes trabalham</text>
      <text x="510" y="134" font-size="13.5" fill="#8b97a4">em paralelo</text>
    </g>
    <g>
      <rect x="727" y="48" width="200" height="104" rx="14" fill="#15181e" stroke="#ffffff" stroke-opacity="0.10"/>
      <circle cx="753" cy="76" r="13" fill="#ffae3d" fill-opacity="0.16"/><text x="753" y="81" text-anchor="middle" font-size="15" font-weight="700" fill="#ffae3d">4</text>
      <text x="745" y="112" font-size="18" font-weight="700" fill="#ffffff">Fluxo ao vivo</text>
      <text x="745" y="134" font-size="13.5" fill="#8b97a4">você acompanha</text>
    </g>
    <g>
      <rect x="962" y="48" width="196" height="104" rx="14" fill="#15181e" stroke="#ffffff" stroke-opacity="0.10"/>
      <circle cx="988" cy="76" r="13" fill="#5fe08a" fill-opacity="0.18"/><text x="988" y="81" text-anchor="middle" font-size="15" font-weight="700" fill="#5fe08a">5</text>
      <text x="980" y="112" font-size="18" font-weight="700" fill="#ffffff">Revisa e integra</text>
      <text x="980" y="134" font-size="13.5" fill="#8b97a4">pronto</text>
    </g>

    <!-- arrows -->
    <line x1="226" y1="100" x2="252" y2="100" stroke="#ffae3d" stroke-width="2.4" marker-end="url(#arr)"/>
    <line x1="461" y1="100" x2="487" y2="100" stroke="#ffae3d" stroke-width="2.4" marker-end="url(#arr)"/>
    <line x1="696" y1="100" x2="722" y2="100" stroke="#ffae3d" stroke-width="2.4" marker-end="url(#arr)"/>
    <line x1="931" y1="100" x2="957" y2="100" stroke="#ffae3d" stroke-width="2.4" marker-end="url(#arr)"/>
  </g>
</svg>
